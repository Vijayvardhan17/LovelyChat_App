<!DOCTYPE html>
<html>
<head>
    <title>Lovely Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Lovely💌</h2>

    <div id="heart-background"></div>

    <div id="chat-container">
        <input id="username" placeholder="Enter your name" autocomplete="off"/>
        <ul id="messages"></ul>
        <input id="input" placeholder="Type your message..." autocomplete="off"/>
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
